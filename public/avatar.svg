<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <!-- Glow for monogram -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <!-- Monogram gradient -->
    <linearGradient id="text-grad" x1="100" y1="120" x2="300" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <!-- Accent ring gradient -->
    <linearGradient id="ring-grad" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="blur-glow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Base circle -->
  <circle cx="200" cy="200" r="200" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#38bdf8" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="300" x2="400" y2="300"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
  </g>

  <!-- Outer accent ring -->
  <circle cx="200" cy="200" r="180" stroke="url(#ring-grad)" stroke-width="1.5" fill="none"/>

  <!-- Inner accent ring -->
  <circle cx="200" cy="200" r="155" stroke="#38bdf8" stroke-opacity="0.08" stroke-width="1" fill="none"/>

  <!-- Glow circle behind monogram -->
  <circle cx="200" cy="200" r="120" fill="url(#glow)"/>

  <!-- Violet blob accent top-left -->
  <ellipse cx="95" cy="105" rx="70" ry="60" fill="#7c3aed" fill-opacity="0.12"/>

  <!-- Cyan blob accent bottom-right -->
  <ellipse cx="310" cy="295" rx="65" ry="55" fill="#0891b2" fill-opacity="0.10"/>

  <!-- Monogram "MD" -->
  <text
    x="200"
    y="242"
    text-anchor="middle"
    font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif"
    font-weight="800"
    font-size="130"
    letter-spacing="-6"
    fill="url(#text-grad)"
    filter="url(#blur-glow)"
  >MD</text>

  <!-- Decorative dots on ring -->
  <circle cx="200" cy="20" r="3" fill="#38bdf8" fill-opacity="0.5"/>
  <circle cx="380" cy="200" r="3" fill="#818cf8" fill-opacity="0.5"/>
  <circle cx="200" cy="380" r="3" fill="#38bdf8" fill-opacity="0.5"/>
  <circle cx="20" cy="200" r="3" fill="#818cf8" fill-opacity="0.5"/>

  <!-- Clip to circle -->
  <circle cx="200" cy="200" r="200" fill="none"/>
</svg>
